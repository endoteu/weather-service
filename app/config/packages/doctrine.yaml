doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

    orm:
        auto_mapping: false
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        validate_xml_mapping: true
        mappings:
            Weather:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/src/Weather/Domain'
                prefix: 'App\Weather\Domain'
                alias: Weather
