services:
  php:
    build:
      context: ./docker/php
    container_name: weather_php
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    depends_on:
      - database
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: weather_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  database:
    image: mariadb:11.4
    container_name: weather_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: weather
      MARIADB_USER: weather
      MARIADB_PASSWORD: weather
      MARIADB_ROOT_PASSWORD: root
      TZ: Europe/Sofia
    ports:
      - "33067:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    container_name: weather_redis
    ports:
      - "6380:6379"

  composer:
    image: composer:2.8
    container_name: weather_composer
    working_dir: /app
    volumes:
      - ./app:/app

volumes:
  mariadb_data: